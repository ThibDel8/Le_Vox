services:
  nginx:
    image: nginx:latest
    container_name: le_vox_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html:delegated
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      php:
        condition: service_healthy
    networks:
      - le_vox_net

  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
      args:
        UID: ${UID}
        GID: ${GID}
    user: "${UID}:${GID}"
    container_name: le_vox_php
    restart: unless-stopped
    volumes:
      - ./:/var/www/html:cached
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "-v"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - le_vox_net

  database:
    image: mysql:8.0
    container_name: le_vox_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: le_vox
      MYSQL_USER: symfony
      MYSQL_PASSWORD: symfony
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - le_vox_net

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: le_vox_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: database
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "8081:80"
    depends_on:
      - database
    networks:
      - le_vox_net

  mailpit:
    image: axllent/mailpit:latest
    container_name: le_vox_mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    volumes:
      - mailpit_data:/data
    networks:
      le_vox_net:
        aliases:
          - mailpit.local

volumes:
  db_data:
  mailpit_data:

networks:
  le_vox_net:
    driver: bridge
